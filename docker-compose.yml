version: '3.8'

services:
  openclaw-lite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-lite
    ports:
      - "18789:18789"
    volumes:
      # 挂载环境变量文件
      - ./.env:/app/.env
      # 持久化数据和日志
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OPENCLAW_PORT=18789
    restart: unless-stopped
    networks:
      - openclaw-network

  # 可选：Redis 服务（用于生产环境的记忆存储）
  # redis:
  #   image: redis:7-alpine
  #   container_name: openclaw-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - openclaw-network

networks:
  openclaw-network:
    driver: bridge

