<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Lite - AI 智能体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px 30px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 30px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message.assistant {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.assistant .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-container {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
        }

        .input-wrapper button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-wrapper button:active {
            transform: translateY(0);
        }

        .input-wrapper button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .skills-panel {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .skills-panel h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .skill-tag {
            padding: 8px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-bar {
            padding: 10px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar .session-id {
            font-family: monospace;
            background: #e0e0e0;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .status-bar button {
            padding: 6px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .status-bar button:hover {
            background: #5568d3;
        }

        /* Markdown 样式 */
        .markdown h1, .markdown h2, .markdown h3 {
            margin: 10px 0 5px;
            color: #333;
        }
        .markdown h2 {
            font-size: 18px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 5px;
        }
        .markdown code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        .markdown pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .markdown pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 OpenClaw Lite</h1>
            <div class="subtitle">ReAct 智能体框架 - 观察思考行动循环</div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content markdown">
                    你好！我是 OpenClaw Lite 智能体助手。

我可以帮助你完成各种任务，包括：
📁 文件操作（读取、写入、列出目录）
🔢 数学计算
⏰ 时间日期查询
📝 文本处理
💻 安全的系统命令执行

请告诉我你需要什么帮助？
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入你的消息..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">发送</button>
            </div>
        </div>

        <div class="skills-panel" id="skillsPanel">
            <h3>🔧 可用技能 <span class="loading" id="skillsLoading"></span></h3>
            <div class="skills-grid" id="skillsGrid">
                <span class="skill-tag">加载中...</span>
            </div>
        </div>

        <div class="status-bar">
            <div>
                会话 ID: <span class="session-id" id="sessionId">...</span>
            </div>
            <button onclick="newSession()">新建会话</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:18789';
        let currentSessionId = 'default';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            newSession();
            loadSkills();
        });

        // 新建会话
        async function newSession() {
            try {
                const response = await fetch(`${API_BASE}/sessions`, {
                    method: 'POST'
                });
                const data = await response.json();
                currentSessionId = data.session_id;
                document.getElementById('sessionId').textContent = currentSessionId.substring(0, 12) + '...';
                clearChat();
                addMessage('assistant', '已创建新会话！请开始对话。');
            } catch (error) {
                console.error('创建会话失败:', error);
                addMessage('assistant', '创建会话失败，请检查服务是否启动。');
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            addMessage('user', message);
            input.value = '';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>思考中...';

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId
                    })
                });

                const data = await response.json();
                addMessage('assistant', data.reply);
            } catch (error) {
                console.error('发送消息失败:', error);
                addMessage('assistant', '发送消息失败，请检查服务是否启动。');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        // 加载技能列表
        async function loadSkills() {
            const loading = document.getElementById('skillsLoading');
            const grid = document.getElementById('skillsGrid');

            try {
                const response = await fetch(`${API_BASE}/skills`);
                const data = await response.json();

                grid.innerHTML = '';
                data.skills.forEach(skill => {
                    const tag = document.createElement('span');
                    tag.className = 'skill-tag';
                    tag.textContent = `${skill.name}: ${skill.description}`;
                    tag.title = skill.description;
                    grid.appendChild(tag);
                });

                loading.style.display = 'none';
            } catch (error) {
                console.error('加载技能失败:', error);
                grid.innerHTML = '<span class="skill-tag">加载失败，请检查服务</span>';
                loading.style.display = 'none';
            }
        }

        // 添加消息到聊天界面
        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content markdown';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 清空聊天
        function clearChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
